```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentiment Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6fb;
}

.card{
    border-radius:16px;
    border:none;
    box-shadow:0 2px 12px rgba(0,0,0,0.07);
}

.badge-positive{
    background:#d1fae5 !important;
    color:#065f46 !important;
}

.badge-neutral{
    background:#fef3c7 !important;
    color:#92400e !important;
}

.badge-negative{
    background:#fee2e2 !important;
    color:#991b1b !important;
}

.result-box{
    display:none;
    margin-top:20px;
}

.confidence-bar{
    height:10px;
    border-radius:99px;
    transition:width .5s ease;
}

#history-table tbody tr:hover{
    background:#f0f4ff;
}
</style>
</head>

<body>

<div class="container py-5" style="max-width:760px;">

    <div class="text-center mb-4">
        <h1 class="fw-bold">Sentiment Analyzer</h1>
        <p class="text-muted">
            Analyze reviews using AI-powered sentiment classification
            (Positive, Neutral, Negative)
        </p>
    </div>

    <div class="card p-4 mb-4">

        <label class="form-label fw-semibold">
            Enter a Review
        </label>

        <textarea
            id="review-input"
            class="form-control"
            rows="4"
            placeholder="Type your review here..."
        ></textarea>

        <button
            class="btn btn-primary mt-3"
            onclick="analyzeSentiment()">
            Analyze Sentiment
        </button>

        <div class="result-box" id="result-box">

            <hr>

            <div class="d-flex align-items-center gap-3 mb-2">

                <span class="fw-bold">
                    Result:
                </span>

                <span
                    id="sentiment-badge"
                    class="badge fs-6 px-3 py-2">
                </span>

            </div>

            <div class="text-muted mb-1">
                Confidence:
                <strong id="confidence-text"></strong>
            </div>

            <div class="bg-light rounded-pill overflow-hidden">
                <div
                    id="confidence-bar"
                    class="confidence-bar">
                </div>
            </div>

        </div>

    </div>

    <div class="card p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h5 class="mb-0">
                Recent Predictions
            </h5>

            <button
                class="btn btn-sm btn-outline-secondary"
                onclick="loadHistory()">
                Refresh
            </button>

        </div>

        <div class="table-responsive">

            <table class="table table-sm" id="history-table">

                <thead class="table-light">
                <tr>
                    <th>Review</th>
                    <th>Sentiment</th>
                    <th>Confidence</th>
                    <th>Time</th>
                </tr>
                </thead>

                <tbody id="history-body">
                    <tr>
                        <td colspan="4" class="text-center text-muted">
                            No history yet
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

const API = "http://127.0.0.1:5000";

async function analyzeSentiment(){

    const text =
        document.getElementById("review-input")
        .value
        .trim();

    if(!text){
        alert("Please enter a review.");
        return;
    }

    const btn =
        document.querySelector("button.btn-primary");

    btn.disabled = true;
    btn.textContent = "Analyzing...";

    try{

        const res = await fetch(`${API}/predict`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                review_text:text
            })
        });

        const data = await res.json();

        const badge =
            document.getElementById("sentiment-badge");

        badge.textContent = data.sentiment;

        badge.className =
            "badge fs-6 px-3 py-2 badge-" +
            data.sentiment.toLowerCase();

        document.getElementById(
            "confidence-text"
        ).textContent =
            data.confidence + "%";

        const bar =
            document.getElementById(
                "confidence-bar"
            );

        bar.style.width =
            data.confidence + "%";

        if(data.sentiment === "Positive"){
            bar.className =
                "confidence-bar bg-success";
        }
        else if(data.sentiment === "Negative"){
            bar.className =
                "confidence-bar bg-danger";
        }
        else{
            bar.className =
                "confidence-bar bg-warning";
        }

        document.getElementById(
            "result-box"
        ).style.display = "block";

        loadHistory();

    }
    catch(error){

        alert(
            "Could not connect to Flask server."
        );

        console.log(error);
    }

    btn.disabled = false;
    btn.textContent = "Analyze Sentiment";
}

async function loadHistory(){

    try{

        const res =
            await fetch(`${API}/history`);

        const data =
            await res.json();

        const tbody =
            document.getElementById(
                "history-body"
            );

        if(!data.length){

            tbody.innerHTML = `
            <tr>
                <td colspan="4"
                    class="text-center text-muted">
                    No history yet
                </td>
            </tr>`;

            return;
        }

        tbody.innerHTML =
            data.map(row => `
                <tr>

                    <td
                    style="
                    max-width:260px;
                    white-space:nowrap;
                    overflow:hidden;
                    text-overflow:ellipsis;"
                    title="${row.review_text}">
                    ${row.review_text}
                    </td>

                    <td>
                        <span class="badge badge-${row.sentiment.toLowerCase()}">
                            ${row.sentiment}
                        </span>
                    </td>

                    <td>
                        ${row.confidence}%
                    </td>

                    <td style="font-size:12px;color:#888;">
                        ${row.created_at}
                    </td>

                </tr>
            `).join("");

    }
    catch(error){

        console.log(
            "History load failed",
            error
        );

    }
}

loadHistory();

</script>

</body>
</html>
